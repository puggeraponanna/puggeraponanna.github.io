<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ site.title | escape }} — {{ site.job_title }}</title>
  <meta name="title" content="{{ site.title | escape }} — {{ site.job_title }}">
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  <meta name="keywords" content="Backend Engineer, Software Developer, Golang, Python, Haskell, C#, Cloud Native, Microservices, AWS, GCP, Bengaluru">
  <meta name="author" content="{{ site.title | escape }}">
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{{ site.title | escape }} — {{ site.job_title }}">
  <meta property="og:description" content="{{ site.description | strip_html | normalize_whitespace | escape }}">
  <meta property="og:site_name" content="{{ site.title | escape }}">

  <meta property="twitter:card" content="summary">
  <meta property="twitter:url" content="{{ page.url | absolute_url }}">
  <meta property="twitter:title" content="{{ site.title | escape }} — {{ site.job_title }}">
  <meta property="twitter:description" content="{{ site.description | strip_html | normalize_whitespace | escape }}">

  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <link rel="icon" type="image/png" href="{{ '/assets/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | relative_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.title | escape }}",
    "url": "{{ site.url }}",
    "email": "{{ site.email }}",
    "jobTitle": "{{ site.job_title }}",
    "description": "{{ site.description | strip_html | normalize_whitespace | escape }}",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Bengaluru",
      "addressCountry": "India"
    },
    "sameAs": [
      "https://github.com/{{ site.github_username }}",
      "https://www.linkedin.com/in/{{ site.linkedin_username }}"
    ],
    "knowsAbout": ["Golang", "Python", "Haskell", "C#", "Microservices", "Cloud Computing", "AWS", "GCP"],
    "alumniOf": {
      "@type": "EducationalOrganization",
      "name": "Sri Jayachamarajendra College of Engineering"
    }
  }
  </script>
</head>

<body>
  {% include header.html %}

  <main class="page-content" aria-label="Content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <script>
    (function() {
      var header = document.querySelector('header');
      var isScrolled = false;

      window.addEventListener('scroll', function() {
        var scrollPos = window.scrollY;
        if (!isScrolled && scrollPos > 60) {
          header.classList.add('scrolled');
          isScrolled = true;
        } else if (isScrolled && scrollPos < 10) {
          header.classList.remove('scrolled');
          isScrolled = false;
        }
      });

      var html = document.documentElement;
      var themeToggle = document.getElementById('theme-toggle');
      var themeIcon = document.querySelector('.theme-icon');

      var currentTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', currentTheme);
      updateIcon(currentTheme);

      themeToggle.addEventListener('click', function() {
        var theme = html.getAttribute('data-theme');
        var newTheme = theme === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
      });

      function updateIcon(theme) {
        themeIcon.textContent = theme === 'light' ? 'dark_mode' : 'light_mode';
      }

      var menuBtn = document.getElementById('mobile-menu-btn');
      var nav = document.getElementById('main-nav');
      var overlay = document.getElementById('mobile-overlay');
      var menuIcon = menuBtn.querySelector('.material-symbols-outlined');

      function closeMenu() {
        nav.classList.remove('open');
        overlay.classList.remove('open');
        menuIcon.textContent = 'menu';
        document.body.style.overflow = '';
      }

      function openMenu() {
        nav.classList.add('open');
        overlay.classList.add('open');
        menuIcon.textContent = 'close';
        document.body.style.overflow = 'hidden';
      }

      menuBtn.addEventListener('click', function() {
        if (nav.classList.contains('open')) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      overlay.addEventListener('click', closeMenu);

      nav.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', closeMenu);
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.timeline-item, .skill-category, .education-card, .contact-section').forEach(function(el) {
        el.classList.add('reveal');
        observer.observe(el);
      });

      var cursorEl = document.querySelector('.hero-cursor-text');
      var cursorBlink = document.querySelector('.hero-cursor .cursor-blink');
      if (cursorEl) {
        var phrases = [
          'Senior Backend Engineer',
          'Golang • Python • Haskell',
          'Distributed Systems',
          'Cloud Native • GCP • AWS',
          '9+ years building at scale'
        ];
        var phraseIdx = 0;
        var charIdx = 0;
        var isDeleting = false;
        var typeSpeed = 60;
        var deleteSpeed = 30;
        var pauseEnd = 2000;
        var pauseStart = 1200;
        var timer;

        function type() {
          var current = phrases[phraseIdx];
          if (!isDeleting) {
            cursorEl.textContent = current.substring(0, charIdx + 1);
            charIdx++;
            if (charIdx === current.length) {
              isDeleting = true;
              timer = setTimeout(type, pauseEnd);
              return;
            }
            timer = setTimeout(type, typeSpeed);
          } else {
            cursorEl.textContent = current.substring(0, charIdx - 1);
            charIdx--;
            if (charIdx === 0) {
              isDeleting = false;
              phraseIdx = (phraseIdx + 1) % phrases.length;
              timer = setTimeout(type, pauseStart);
              return;
            }
            timer = setTimeout(type, deleteSpeed);
          }
        }

        setTimeout(type, 800);
      }
    })();
  </script>
</body>

</html>
